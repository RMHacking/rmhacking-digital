<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Portal do Cliente — RMHacking</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0a0a14;color:#e2e8f0;min-height:100vh}

/* Header */
.top-bar{background:linear-gradient(135deg,#1a1a2e 0%,#16213e 100%);border-bottom:1px solid rgba(255,255,255,.07);padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.brand{display:flex;align-items:center;gap:10px;font-weight:700;font-size:15px;color:#a5b4fc}
.brand-icon{width:32px;height:32px;background:linear-gradient(135deg,#4f46e5,#7c3aed);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px}
.user-chip{background:rgba(79,70,229,.15);border:1px solid rgba(79,70,229,.3);border-radius:20px;padding:5px 14px;font-size:12px;color:#a5b4fc;display:flex;align-items:center;gap:6px}
.logout-btn{background:none;border:1px solid rgba(255,255,255,.12);color:#9ca3af;border-radius:6px;padding:5px 12px;font-size:12px;cursor:pointer;margin-left:10px;transition:all .2s}
.logout-btn:hover{border-color:#ef4444;color:#ef4444}

/* Main layout */
.main{max-width:960px;margin:0 auto;padding:28px 20px}

/* Status banner */
.status-banner{border-radius:14px;padding:28px 32px;margin-bottom:28px;position:relative;overflow:hidden}
.status-banner.todo{background:linear-gradient(135deg,#1e3a5f,#1a2a4a);border:1px solid rgba(59,130,246,.3)}
.status-banner.open{background:linear-gradient(135deg,#2d1b69,#1a1040);border:1px solid rgba(139,92,246,.3)}
.status-banner.closed{background:linear-gradient(135deg,#064e3b,#022c22);border:1px solid rgba(16,185,129,.3)}
.status-banner::before{content:'';position:absolute;top:-40px;right:-40px;width:160px;height:160px;border-radius:50%;opacity:.07;background:#fff}
.inv-title{font-size:22px;font-weight:800;margin-bottom:6px}
.inv-sub{font-size:13px;color:#9ca3af;margin-bottom:18px}
.status-pill{display:inline-flex;align-items:center;gap:6px;padding:5px 14px;border-radius:20px;font-size:12px;font-weight:700;margin-bottom:18px}
.status-pill.todo{background:rgba(59,130,246,.2);color:#93c5fd;border:1px solid rgba(59,130,246,.3)}
.status-pill.open{background:rgba(139,92,246,.2);color:#c4b5fd;border:1px solid rgba(139,92,246,.3)}
.status-pill.closed{background:rgba(16,185,129,.2);color:#6ee7b7;border:1px solid rgba(16,185,129,.3)}

/* Progress bar */
.progress-label{font-size:12px;color:#9ca3af;margin-bottom:6px;display:flex;justify-content:space-between}
.progress-track{background:rgba(255,255,255,.08);border-radius:20px;height:10px;overflow:hidden}
.progress-fill{height:100%;border-radius:20px;transition:width 1s ease;background:linear-gradient(90deg,#4f46e5,#7c3aed)}
.progress-fill.done{background:linear-gradient(90deg,#10b981,#059669)}

/* Stat cards */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:28px}
@media(max-width:600px){.stat-grid{grid-template-columns:repeat(2,1fr)}}
.stat-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:12px;padding:18px 20px;text-align:center}
.stat-num{font-size:28px;font-weight:800;color:#a5b4fc;margin-bottom:4px}
.stat-lbl{font-size:11px;color:#6b7280;text-transform:uppercase;letter-spacing:.5px}

/* Section panels */
.section{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:14px;margin-bottom:20px;overflow:hidden}
.section-header{padding:16px 22px;border-bottom:1px solid rgba(255,255,255,.06);display:flex;align-items:center;gap:10px}
.section-title{font-size:14px;font-weight:700;color:#e2e8f0}
.section-count{font-size:11px;color:#6b7280;background:rgba(255,255,255,.06);border-radius:10px;padding:2px 8px}
.section-body{padding:20px 22px}

/* Timeline */
.tl-wrap{display:flex;flex-direction:column;gap:0}
.tl-item{display:flex;gap:16px;position:relative;padding-bottom:24px}
.tl-item:last-child{padding-bottom:0}
.tl-left{display:flex;flex-direction:column;align-items:center;width:32px;flex-shrink:0}
.tl-dot{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;border:2px solid rgba(255,255,255,.1)}
.tl-dot.high{background:rgba(239,68,68,.2);border-color:rgba(239,68,68,.5)}
.tl-dot.medium{background:rgba(79,70,229,.2);border-color:rgba(79,70,229,.5)}
.tl-dot.low{background:rgba(75,85,99,.2);border-color:rgba(75,85,99,.5)}
.tl-line{width:2px;flex:1;background:rgba(255,255,255,.06);margin-top:4px}
.tl-content{flex:1;padding-top:4px}
.tl-date{font-size:10px;color:#6b7280;margin-bottom:3px;font-weight:600;text-transform:uppercase;letter-spacing:.4px}
.tl-title{font-size:13px;font-weight:700;color:#e2e8f0;margin-bottom:3px}
.tl-desc{font-size:12px;color:#9ca3af;line-height:1.5}

/* Evidence items */
.ev-item{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-left:3px solid #4f46e5;border-radius:0 8px 8px 0;padding:12px 16px;margin-bottom:10px}
.ev-item:last-child{margin-bottom:0}
.ev-type{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;background:rgba(79,70,229,.2);color:#a5b4fc;border:1px solid rgba(79,70,229,.3);margin-bottom:6px}
.ev-title{font-size:13px;font-weight:700;color:#e2e8f0;margin-bottom:4px}
.ev-content{font-size:12px;color:#9ca3af;line-height:1.5}

/* Gallery */
.gallery-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px}
.gal-card{border-radius:10px;overflow:hidden;border:1px solid rgba(255,255,255,.07);cursor:pointer;transition:all .2s}
.gal-card:hover{border-color:rgba(79,70,229,.4);transform:translateY(-2px)}
.gal-img{width:100%;height:140px;object-fit:cover;display:block;background:#1a1a2e}
.gal-info{padding:10px 12px}
.gal-title{font-size:12px;font-weight:600;color:#e2e8f0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gal-date{font-size:10px;color:#6b7280;margin-top:2px}

/* Lightbox */
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:999;display:none;align-items:center;justify-content:center;flex-direction:column}
.lightbox.open{display:flex}
.lightbox img{max-width:90vw;max-height:80vh;border-radius:8px;object-fit:contain}
.lightbox-title{margin-top:14px;font-size:14px;font-weight:600;color:#e2e8f0}
.lightbox-close{position:absolute;top:18px;right:22px;background:none;border:none;color:#9ca3af;font-size:28px;cursor:pointer;line-height:1}
.lightbox-close:hover{color:#fff}

/* Empty states */
.empty{text-align:center;padding:32px;color:#4b5563;font-size:13px}
.empty-icon{font-size:32px;margin-bottom:8px}

/* Update notes */
.note-item{background:rgba(251,191,36,.06);border:1px solid rgba(251,191,36,.15);border-radius:8px;padding:12px 16px;margin-bottom:10px}
.note-title{font-size:13px;font-weight:700;color:#fde68a;margin-bottom:4px}
.note-content{font-size:12px;color:#9ca3af;line-height:1.5}

/* Loading */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:16px}
.spinner{width:40px;height:40px;border:3px solid rgba(79,70,229,.2);border-top-color:#4f46e5;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{color:#6b7280;font-size:14px}

/* Access denied */
.denied{text-align:center;padding:60px 20px}
.denied-icon{font-size:60px;margin-bottom:20px}
.denied h2{font-size:20px;font-weight:700;margin-bottom:8px;color:#ef4444}
.denied p{color:#6b7280;font-size:13px}
</style>
</head>
<body>

<div class="top-bar">
  <div class="brand">
    <div class="brand-icon">🔍</div>
    RMHacking Digital
  </div>
  <div style="display:flex;align-items:center;gap:8px">
    <div class="user-chip">👤 <span id="usernameLabel">—</span></div>
    <button class="logout-btn" onclick="logout()">Sair</button>
  </div>
</div>

<div id="appRoot" class="main">
  <div class="loading" id="loadingState">
    <div class="spinner"></div>
    <div class="loading-text">Carregando sua investigação...</div>
  </div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">×</button>
  <img id="lbImg" src="" alt="">
  <div class="lightbox-title" id="lbTitle"></div>
</div>

<script>
const params = new URLSearchParams(location.search);
const invId = params.get('id');
let _inv = null, _me = null;

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escnl(s){ return esc(s).replace(/\n/g,'<br>'); }

async function init() {
  // Check session
  try {
    const r = await fetch('/api/me');
    if (!r.ok) { location.href='/login'; return; }
    _me = await r.json();
    document.getElementById('usernameLabel').textContent = _me.username || 'cliente';
  } catch(e) { location.href='/login'; return; }

  if (!invId) { showDenied('Nenhuma investigação especificada.'); return; }

  // Load investigation
  try {
    const r = await fetch('/api/investigations/'+invId);
    if (!r.ok) { showDenied('Investigação não encontrada ou sem permissão de acesso.'); return; }
    _inv = await r.json();
  } catch(e) { showDenied('Erro ao carregar a investigação.'); return; }

  // Load all data in parallel
  const [ev, evt, nt, gallery] = await Promise.all([
    fetch('/api/investigations/'+invId+'/evidence').then(r=>r.ok?r.json():[]).catch(()=>[]),
    fetch('/api/investigations/'+invId+'/events').then(r=>r.ok?r.json():[]).then(d=>d.sort((a,b)=>new Date(a.event_date)-new Date(b.event_date))).catch(()=>[]),
    fetch('/api/investigations/'+invId+'/notes').then(r=>r.ok?r.json():[]).catch(()=>[]),
    fetch('/api/investigations/'+invId+'/gallery').then(r=>r.ok?r.json():[]).catch(()=>[]),
  ]);

  renderPortal(_inv, ev, evt, nt, gallery);
}

function showDenied(msg) {
  document.getElementById('appRoot').innerHTML = `
    <div class="denied">
      <div class="denied-icon">🔒</div>
      <h2>Acesso Negado</h2>
      <p>${esc(msg)}</p>
    </div>`;
}

function renderPortal(inv, ev, evt, nt, gallery) {
  const statusMap = { todo:'Para Fazer', open:'Em Processo', closed:'Finalizada' };
  const statusKey = inv.status==='closed'?'closed':inv.status==='todo'?'todo':'open';
  const statusLabel = statusMap[statusKey]||inv.status;
  const priMap = { high:'Alta 🔴', medium:'Média 🟡', low:'Baixa 🟢' };
  const progressMap = { todo:10, open:50, closed:100 };
  const progress = progressMap[statusKey]||50;

  const deadlineStr = inv.deadline
    ? new Date(inv.deadline+'T00:00:00').toLocaleDateString('pt-BR',{day:'2-digit',month:'long',year:'numeric'})
    : null;

  // Count public notes (non-internal)
  const pubNotes = nt.filter(n => n.title && !n.title.toLowerCase().includes('interno'));

  const html = `
    <!-- Status Banner -->
    <div class="status-banner ${statusKey}">
      <div class="status-pill ${statusKey}">${statusKey==='closed'?'✅':statusKey==='todo'?'🕐':'🔍'} ${esc(statusLabel)}</div>
      <div class="inv-title">${esc(inv.title)}</div>
      <div class="inv-sub">${inv.target?'Alvo: '+esc(inv.target):''}${inv.tags?' · '+esc(inv.tags):''}</div>
      <div class="progress-label">
        <span>Progresso da Investigação</span>
        <span>${progress}%</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill ${statusKey==='closed'?'done':''}" id="progressFill" style="width:0%"></div>
      </div>
    </div>

    <!-- Stat Cards -->
    <div class="stat-grid">
      <div class="stat-card">
        <div class="stat-num">${ev.length}</div>
        <div class="stat-lbl">Evidências</div>
      </div>
      <div class="stat-card">
        <div class="stat-num">${evt.length}</div>
        <div class="stat-lbl">Eventos</div>
      </div>
      <div class="stat-card">
        <div class="stat-num">${gallery.length}</div>
        <div class="stat-lbl">Imagens</div>
      </div>
      <div class="stat-card">
        <div class="stat-num">${deadlineStr?deadlineStr:'—'}</div>
        <div class="stat-lbl">Prazo</div>
      </div>
    </div>

    <!-- Timeline -->
    ${evt.length ? `
    <div class="section">
      <div class="section-header">
        <span style="font-size:18px">📅</span>
        <span class="section-title">Linha do Tempo</span>
        <span class="section-count">${evt.length} evento${evt.length>1?'s':''}</span>
      </div>
      <div class="section-body">
        <div class="tl-wrap">
          ${evt.map((e,i)=>`
            <div class="tl-item">
              <div class="tl-left">
                <div class="tl-dot ${e.importance||'medium'}">${e.importance==='high'?'🔴':e.importance==='low'?'⚪':'🔵'}</div>
                ${i<evt.length-1?'<div class="tl-line"></div>':''}
              </div>
              <div class="tl-content">
                <div class="tl-date">${e.event_date?new Date(e.event_date).toLocaleString('pt-BR',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}):''}</div>
                <div class="tl-title">${esc(e.title)}</div>
                ${e.description?`<div class="tl-desc">${escnl(e.description)}</div>`:''}
              </div>
            </div>`).join('')}
        </div>
      </div>
    </div>` : ''}

    <!-- Evidence -->
    ${ev.length ? `
    <div class="section">
      <div class="section-header">
        <span style="font-size:18px">🔒</span>
        <span class="section-title">Evidências Coletadas</span>
        <span class="section-count">${ev.length}</span>
      </div>
      <div class="section-body">
        ${ev.map(e=>`
          <div class="ev-item">
            <div class="ev-type">${esc(e.type||'texto')}</div>
            <div class="ev-title">${esc(e.title)}</div>
            ${e.content?`<div class="ev-content">${escnl((e.content||'').substring(0,400))}</div>`:''}
            ${e.source?`<div style="font-size:11px;color:#4b5563;margin-top:5px">📌 ${esc(e.source)}</div>`:''}
            ${e.hash_value?`<div style="font-size:10px;font-family:monospace;color:#10b981;margin-top:5px;word-break:break-all">🔐 ${esc(e.hash_value)}</div>`:''}
            ${(e.file_data||e.file_url)?`<div style="margin-top:6px">${renderFile(e)}</div>`:''}
          </div>`).join('')}
      </div>
    </div>` : ''}

    <!-- Gallery -->
    ${gallery.length ? `
    <div class="section">
      <div class="section-header">
        <span style="font-size:18px">🖼️</span>
        <span class="section-title">Galeria de Evidências</span>
        <span class="section-count">${gallery.length} imagem${gallery.length>1?'ns':''}</span>
      </div>
      <div class="section-body">
        <div class="gallery-grid">
          ${gallery.map(g=>`
            <div class="gal-card" onclick="openLightbox('${esc(g.image_data.substring(0,50))}','${esc(g.title||'Sem título')}','${g.id}')">
              <img class="gal-img" src="${g.image_data}" loading="lazy" alt="${esc(g.title||'')}">
              <div class="gal-info">
                <div class="gal-title">${esc(g.title||'Sem título')}</div>
                <div class="gal-date">${g.created_at?new Date(g.created_at).toLocaleDateString('pt-BR'):''}</div>
              </div>
            </div>`).join('')}
        </div>
      </div>
    </div>` : ''}

    <!-- Update Notes -->
    ${pubNotes.length ? `
    <div class="section">
      <div class="section-header">
        <span style="font-size:18px">📝</span>
        <span class="section-title">Atualizações</span>
        <span class="section-count">${pubNotes.length}</span>
      </div>
      <div class="section-body">
        ${pubNotes.map(n=>`
          <div class="note-item">
            <div class="note-title">${esc(n.title)}</div>
            <div class="note-content">${escnl((n.content||'').substring(0,500))}</div>
            <div style="font-size:10px;color:#6b7280;margin-top:6px">${n.created_at?new Date(n.created_at).toLocaleDateString('pt-BR',{day:'2-digit',month:'long',year:'numeric'}):''}</div>
          </div>`).join('')}
      </div>
    </div>` : ''}

    <!-- Footer -->
    <div style="text-align:center;padding:32px 0 8px;font-size:11px;color:#374151">
      🔍 RMHacking Investigação Digital · Portal do Cliente · Acesso restrito e confidencial
    </div>
  `;

  document.getElementById('appRoot').innerHTML = html;

  // Animate progress bar
  setTimeout(()=>{
    const fill = document.getElementById('progressFill');
    if (fill) fill.style.width = progress+'%';
  }, 100);

  // Store gallery for lightbox
  window._galleryData = gallery;
}

function renderFile(e) {
  const src = e.file_data || e.file_url;
  if (!src) return '';
  const type = e.file_type||'';
  if (type.startsWith('image/')) {
    return '<img src="'+src+'" style="max-width:100%;max-height:200px;border-radius:6px;margin-top:4px;cursor:pointer" onclick="openLightbox(\''+src+'\',\''+esc(e.file_name||'imagem')+'\',\'file\')">';
  }
  const icon = type.includes('pdf')?'📄':type.includes('word')?'📝':type.includes('sheet')||type.includes('excel')?'📊':'📎';
  if (e.file_data) return '<a href="'+e.file_data+'" download="'+esc(e.file_name||'arquivo')+'" style="color:#a5b4fc;font-size:11px;text-decoration:none">'+icon+' '+esc(e.file_name||'arquivo')+'</a>';
  return '<a href="'+esc(src)+'" target="_blank" style="color:#a5b4fc;font-size:11px;text-decoration:none">'+icon+' '+esc(e.file_name||'arquivo')+'</a>';
}

function openLightbox(srcOrPrefix, title, id) {
  // Find full image from gallery data or use src directly
  let src = srcOrPrefix;
  if (window._galleryData && id !== 'file') {
    const item = window._galleryData.find(g=>g.id===id);
    if (item) src = item.image_data;
  }
  document.getElementById('lbImg').src = src;
  document.getElementById('lbTitle').textContent = title;
  document.getElementById('lightbox').classList.add('open');
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.getElementById('lbImg').src = '';
}

async function logout() {
  await fetch('/api/logout', {method:'POST'});
  location.href = '/login';
}

init();
</script>
</body>
</html>
